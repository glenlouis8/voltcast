# retrain.yml — WEEKLY drift/staleness watchdog.
#
# Runs `pipeline.py retrain`: per region, check drift (drift.py) + champion age.
# Retrain only regions that drifted OR whose champion is older than the age cap.
# Clean + fresh regions are skipped (no compute wasted).

name: retrain

on:
  schedule:
    - cron: "0 2 * * 0"      # Sunday 02:00 UTC (0 = Sunday). Weekly.
  workflow_dispatch: {}        # manual "Run workflow" button

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # training is heavier than forecasting
    env:
      EIA_API_KEY:           ${{ secrets.EIA_API_KEY }}
      DAGSHUB_REPO_OWNER:    ${{ secrets.DAGSHUB_REPO_OWNER }}
      DAGSHUB_REPO_NAME:     ${{ secrets.DAGSHUB_REPO_NAME }}
      DAGSHUB_TOKEN:         ${{ secrets.DAGSHUB_TOKEN }}
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ${{ secrets.AWS_DEFAULT_REGION }}
      S3_BUCKET:             ${{ secrets.S3_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run retrain pipeline
        run: uv run python src/pipeline.py retrain
